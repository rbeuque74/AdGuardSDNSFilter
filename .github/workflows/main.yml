name: Sync Fork

on:
  schedule:
    - cron: '5 */6 * * *' # Every 6th hour
  workflow_dispatch: # on button click

jobs:
  sync:

    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Fork Sync
        uses: tgymnich/fork-sync@v2.0.10
        with:
          owner: AdguardTeam
          base: gh-pages
          head: gh-pages
          ignore_fail: true
